
[functions.quote]
enabled = true
verify_jwt = true
import_map = "./functions/quote/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/quote/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/quote/*.html" ]

# Phase 2b-2: cron auth migration. JWT verification disabled so the function is
# reachable without a legacy JWT; the function's own apikey-header validation
# (SB_SECRET_KEY_CRON, constant-time, fail-closed) is the authentication guard.
# (Before 2b-2 this was verify_jwt=false with NO guard — publicly unauthenticated.)
[functions.process-week-results]
enabled = true
verify_jwt = false
entrypoint = "./functions/process-week-results/index.ts"

# Phase 2b-1: cron auth migration. JWT verification disabled so the function is
# reachable without a legacy JWT; the function's own apikey-header validation
# (SB_SECRET_KEY_CRON, constant-time, fail-closed) is the authentication guard.
[functions.snapshot-week-end]
verify_jwt = false

# Phase 2b-2 (Sub-phase B): cron auth migration. JWT verification disabled so the
# function is reachable without a legacy JWT; the function's own apikey-header
# validation (SB_SECRET_KEY_CRON, constant-time, fail-closed) is the auth guard.
[functions.snapshot-week-start]
verify_jwt = false

# Phase 2b-2 (Sub-phase C): cron auth migration. This is a true->false FLIP — the
# function was previously JWT-verified (cron sent a service_role JWT). Disabling
# verify_jwt EXPOSES it publicly, so the function's own apikey-header validation
# (SB_SECRET_KEY_CRON, constant-time, fail-closed) becomes its ONLY protection.
# sync-alpaca-orders is cron-only (no client invokes it); its user-authed
# verify/sync modes are now USER-UNREACHABLE (Phase 5 dead-code cleanup).
[functions.sync-alpaca-orders]
verify_jwt = false

# RLS-hardening: refresh-symbols is invoked by authenticated users from the
# client. Platform JWT verification is the auth: any caller with a valid user
# JWT is allowed; anonymous callers are rejected with 401 at the gateway.
# Previously this function had NO block and NO guard — publicly callable,
# RLS-bypassing upsert. NOTE: verify_jwt=true authorizes ALL authenticated
# callers, not just admins; the upsert uses SB_SECRET_KEY_INTERNAL (bypasses
# RLS), so any authenticated user who calls this can rewrite the symbols table.
[functions.refresh-symbols]
enabled = true
verify_jwt = true
entrypoint = "./functions/refresh-symbols/index.ts"
